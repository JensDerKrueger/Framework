<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-label="Screen space ambient occlusion hemisphere sampling">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#9a6a00"/>
    </marker>
    <marker id="greenArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2f8a49"/>
    </marker>
  </defs>

  <rect width="920" height="430" fill="#f4f1eb"/>
  <line x1="80" y1="335" x2="500" y2="335" stroke="#7f878a" stroke-width="3"/>
  <path d="M160,335 C215,215 365,215 420,335" fill="none" stroke="#5851b8" stroke-width="3"/>

  <circle cx="290" cy="335" r="8" fill="#202426"/>
  <line x1="290" y1="335" x2="290" y2="170" stroke="#9a6a00" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="305" y="180" fill="#9a6a00" font-family="sans-serif" font-size="24">normal N</text>
  <text x="250" y="370" fill="#202426" font-family="sans-serif" font-size="22">visible point</text>

  <line x1="290" y1="335" x2="210" y2="260" stroke="#2f8a49" stroke-width="3" marker-end="url(#greenArrow)"/>
  <line x1="290" y1="335" x2="250" y2="210" stroke="#2f8a49" stroke-width="3" marker-end="url(#greenArrow)"/>
  <line x1="290" y1="335" x2="330" y2="215" stroke="#2f8a49" stroke-width="3" marker-end="url(#greenArrow)"/>
  <line x1="290" y1="335" x2="395" y2="270" stroke="#2f8a49" stroke-width="3" marker-end="url(#greenArrow)"/>
  <line x1="290" y1="335" x2="350" y2="300" stroke="#2f8a49" stroke-width="3" marker-end="url(#greenArrow)"/>
  <text x="105" y="95" fill="#2f8a49" font-family="sans-serif" font-size="24">sample directions in the hemisphere</text>

  <rect x="590" y="70" width="250" height="250" fill="#ffffff" stroke="#b9b1a5" stroke-width="3"/>
  <g stroke="#d8d2c6" stroke-width="1">
    <line x1="640" y1="70" x2="640" y2="320"/>
    <line x1="690" y1="70" x2="690" y2="320"/>
    <line x1="740" y1="70" x2="740" y2="320"/>
    <line x1="790" y1="70" x2="790" y2="320"/>
    <line x1="590" y1="120" x2="840" y2="120"/>
    <line x1="590" y1="170" x2="840" y2="170"/>
    <line x1="590" y1="220" x2="840" y2="220"/>
    <line x1="590" y1="270" x2="840" y2="270"/>
  </g>
  <circle cx="715" cy="195" r="7" fill="#202426"/>
  <circle cx="775" cy="145" r="7" fill="#2f8a49"/>
  <circle cx="650" cy="245" r="7" fill="#2f8a49"/>
  <circle cx="755" cy="260" r="7" fill="#2f8a49"/>
  <text x="615" y="355" fill="#202426" font-family="sans-serif" font-size="22">project sample positions</text>
  <text x="635" y="383" fill="#202426" font-family="sans-serif" font-size="22">back into the G-buffer</text>

  <path d="M420,250 C490,210 520,185 585,180" fill="none" stroke="#9a6a00" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="470" y="240" fill="#9a6a00" font-family="sans-serif" font-size="22">projection</text>
</svg>
