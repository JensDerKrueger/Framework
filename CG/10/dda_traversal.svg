<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">2D slice of DDA traversal through octree child cells</title>
  <desc id="desc">A ray crosses a two by two grid. The next vertical or horizontal boundary determines which cell is visited next.</desc>
  <defs>
    <marker id="arrow" markerWidth="5" markerHeight="5" refX="4.4" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 5 2.5 L 0 5 z" fill="#9a6a00"/>
    </marker>
    <marker id="axisArrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#007fa3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="420" rx="8" fill="#f4f1eb"/>

  <g transform="translate(58 44)">
    <rect x="0" y="0" width="320" height="320" fill="#ffffff" stroke="#3c4548" stroke-width="3"/>
    <line x1="160" y1="0" x2="160" y2="320" stroke="#b9b1a5" stroke-width="2" stroke-dasharray="8 8"/>
    <line x1="0" y1="160" x2="320" y2="160" stroke="#b9b1a5" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="0" y="160" width="160" height="160" fill="#007fa3" opacity="0.16"/>
    <rect x="160" y="160" width="160" height="160" fill="#b8f58a" opacity="0.15"/>
    <rect x="160" y="0" width="160" height="160" fill="#9a6a00" opacity="0.16"/>

    <text x="80" y="246" fill="#202426" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">cell 0</text>
    <text x="240" y="246" fill="#202426" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">cell 1</text>
    <text x="240" y="86" fill="#202426" font-size="20" text-anchor="middle" font-family="Arial, sans-serif">cell 2</text>

    <line x1="-28" y1="292" x2="348" y2="76" stroke="#9a6a00" stroke-width="5" marker-end="url(#arrow)"/>
    <circle cx="0" cy="276" r="7" fill="#b65345"/>
    <circle cx="160" cy="184" r="7" fill="#b65345"/>
    <circle cx="202" cy="160" r="7" fill="#b65345"/>
    <text x="12" y="296" fill="#b65345" font-size="17" font-family="Arial, sans-serif">currentT entry</text>
    <text x="172" y="204" fill="#b65345" font-size="17" font-family="Arial, sans-serif">nextT</text>

    <line x1="160" y1="184" x2="160" y2="324" stroke="#b65345" stroke-width="2"/>
    <line x1="202" y1="160" x2="324" y2="160" stroke="#b65345" stroke-width="2"/>
    <text x="168" y="304" fill="#b65345" font-size="17" font-family="Arial, sans-serif">tMaxX</text>
    <text x="258" y="144" fill="#b65345" font-size="17" font-family="Arial, sans-serif">tMaxY</text>

    <text x="0" y="348" fill="#202426" font-size="18" font-family="Arial, sans-serif">2D slice of one octree node</text>
  </g>

  <g transform="translate(458 52)" font-family="Arial, sans-serif">
    <text x="0" y="0" fill="#202426" font-size="24" font-weight="700">DDA traversal idea</text>
    <text x="0" y="44" fill="#5f696d" font-size="18">1. Start in the child cell containing the ray entry point.</text>
    <text x="0" y="82" fill="#5f696d" font-size="18">2. Compute the ray parameter for the next grid boundary</text>
    <text x="22" y="108" fill="#5f696d" font-size="18">on every axis: tMaxX, tMaxY, tMaxZ.</text>
    <text x="0" y="146" fill="#5f696d" font-size="17">3. The smallest tMax tells which boundary is crossed first.</text>
    <text x="22" y="171" fill="#5f696d" font-size="17">Advance that cell coordinate and add tDelta</text>
    <text x="22" y="196" fill="#5f696d" font-size="17">for that axis.</text>
    <text x="0" y="231" fill="#5f696d" font-size="17">4. Recurse only into visited child cells. Stop early once</text>
    <text x="22" y="256" fill="#5f696d" font-size="17">the closest hit is before the next cell boundary.</text>

    <line x1="0" y1="296" x2="350" y2="296" stroke="#007fa3" stroke-width="3" marker-end="url(#axisArrow)"/>
    <circle cx="32" cy="296" r="6" fill="#007fa3"/>
    <circle cx="158" cy="296" r="6" fill="#007fa3"/>
    <circle cx="286" cy="296" r="6" fill="#007fa3"/>
    <text x="20" y="328" fill="#007fa3" font-size="16">currentT</text>
    <text x="126" y="328" fill="#007fa3" font-size="16">next boundary</text>
    <text x="256" y="328" fill="#007fa3" font-size="16">nextT</text>
  </g>
</svg>
