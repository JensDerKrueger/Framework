<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-label="Triangle rasterization with bounding box and edge functions">
  <rect width="860" height="430" fill="#f4f1eb"/>
  <g transform="translate(75,45)">
    <g stroke="#d8d2c6" stroke-width="1">
      <line x1="0" y1="0" x2="520" y2="0"/>
      <line x1="0" y1="40" x2="520" y2="40"/>
      <line x1="0" y1="80" x2="520" y2="80"/>
      <line x1="0" y1="120" x2="520" y2="120"/>
      <line x1="0" y1="160" x2="520" y2="160"/>
      <line x1="0" y1="200" x2="520" y2="200"/>
      <line x1="0" y1="240" x2="520" y2="240"/>
      <line x1="0" y1="280" x2="520" y2="280"/>
      <line x1="0" y1="320" x2="520" y2="320"/>
      <line x1="0" y1="0" x2="0" y2="320"/>
      <line x1="40" y1="0" x2="40" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="120" y1="0" x2="120" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="280" y1="0" x2="280" y2="320"/>
      <line x1="320" y1="0" x2="320" y2="320"/>
      <line x1="360" y1="0" x2="360" y2="320"/>
      <line x1="400" y1="0" x2="400" y2="320"/>
      <line x1="440" y1="0" x2="440" y2="320"/>
      <line x1="480" y1="0" x2="480" y2="320"/>
      <line x1="520" y1="0" x2="520" y2="320"/>
    </g>
    <rect x="105" y="80" width="305" height="205" fill="none" stroke="#9a6a00" stroke-width="4" stroke-dasharray="10 8"/>
    <polygon points="105,260 410,80 290,285" fill="#007fa3" fill-opacity="0.35" stroke="#202426" stroke-width="4"/>
    <line x1="105" y1="260" x2="410" y2="80" stroke="#b43d43" stroke-width="5"/>
    <line x1="410" y1="80" x2="290" y2="285" stroke="#2f8a49" stroke-width="5"/>
    <line x1="290" y1="285" x2="105" y2="260" stroke="#5851b8" stroke-width="5"/>
    <circle cx="260" cy="205" r="7" fill="#202426"/>
    <text x="275" y="211" fill="#202426" font-family="sans-serif" font-size="22">p</text>
    <text x="250" y="65" fill="#9a6a00" font-family="sans-serif" font-size="22" text-anchor="middle">AABB</text>
  </g>
  <text x="620" y="82" fill="#b43d43" font-family="sans-serif" font-size="22">red edge test</text>
  <text x="620" y="110" fill="#202426" font-family="sans-serif" font-size="19">p is inside</text>
  <text x="620" y="148" fill="#2f8a49" font-family="sans-serif" font-size="22">green edge test</text>
  <text x="620" y="176" fill="#202426" font-family="sans-serif" font-size="19">p is inside</text>
  <text x="620" y="214" fill="#5851b8" font-family="sans-serif" font-size="22">blue edge test</text>
  <text x="620" y="242" fill="#202426" font-family="sans-serif" font-size="19">p is inside</text>
  <text x="610" y="292" fill="#202426" font-family="sans-serif" font-size="21">test only pixels</text>
  <text x="610" y="321" fill="#202426" font-family="sans-serif" font-size="21">inside the AABB</text>
  <text x="430" y="382" fill="#202426" font-family="sans-serif" font-size="22" text-anchor="middle">
    <tspan x="430" dy="0">Each edge function returns a signed area</tspan>
    <tspan x="430" dy="29">The same sign for all three edges means inside</tspan>
  </text>
</svg>
